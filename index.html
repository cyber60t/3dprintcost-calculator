
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator3d - Pro Analyzer</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#39FF14">
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/915/915354.png">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/915/915354.png">
    <meta name="apple-mobile-web-app-capable" content="yes">

    <style>
        :root {
            --neon-green: #39FF14;
            --neon-glow: 0 0 10px #39FF14;
            --bg-dark: #000000;
            --card-bg: #0a0a0a;
            --base-scale: 100%;
        }

        * { box-sizing: border-box; font-family: 'Courier New', Courier, monospace; }

        body {
            background-color: var(--bg-dark);
            color: var(--neon-green);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            font-size: var(--base-scale);
        }

        .app-container {
            background: var(--card-bg);
            width: 100%;
            max-width: 600px;
            padding: 2em;
            border: 2px solid var(--neon-green);
            box-shadow: var(--neon-glow);
        }

        header {
            text-align: center;
            border-bottom: 2px solid var(--neon-green);
            margin-bottom: 1.5em;
            padding-bottom: 1em;
        }

        .brand-name { font-size: 1.8em; font-weight: bold; letter-spacing: 4px; text-shadow: var(--neon-glow); }

        .controls-row { display: flex; justify-content: space-between; gap: 10px; margin-top: 15px; }

        .control-btn {
            background: transparent; border: 1px solid var(--neon-green); color: var(--neon-green);
            padding: 5px 10px; cursor: pointer; font-size: 0.7em;
        }

        .control-btn.active { background: var(--neon-green); color: #000; }

        h2 { font-size: 0.9em; border-left: 4px solid var(--neon-green); padding-left: 10px; margin: 1.5em 0 1em 0; text-transform: uppercase; }

        .input-group { margin-bottom: 1em; }
        label { display: block; font-size: 0.75em; margin-bottom: 0.4em; opacity: 0.8; }
        
        input, select {
            width: 100%; background: #000; border: 1px solid var(--neon-green); color: var(--neon-green);
            padding: 0.8em; font-size: 1em; outline: none;
        }

        .row { display: grid; grid-template-columns: 1fr 1fr; gap: 1em; }

        .analysis-box {
            margin-top: 1.5em;
            border: 1px dashed var(--neon-green);
            padding: 1.2em;
            background: rgba(57, 255, 20, 0.03);
        }

        .data-line { display: flex; justify-content: space-between; margin-bottom: 0.6em; font-size: 0.85em; }
        .val { font-weight: bold; color: #fff; }
        
        .warning-text {
            font-size: 0.65em;
            color: #ffaa00;
            margin-top: 5px;
            display: block;
            line-height: 1.2;
        }

        .alert-heavy {
            font-size: 0.75em; color: #fff; background: #ff0055;
            padding: 8px; display: none; margin: 10px 0; text-align: center; font-weight: bold;
        }

        .recommended-price {
            margin-top: 1.5em; padding: 1.2em; background: var(--neon-green);
            color: #000; text-align: center; box-shadow: var(--neon-glow);
        }

        .price-display { font-size: 2.8em; font-weight: 900; display: block; }

        footer { text-align: center; font-size: 0.7em; margin-top: 2em; opacity: 0.5; }
    </style>
</head>
<body>

<div class="app-container">
    <header>
        <div class="brand-name">CALCULATOR3D</div>
        <div class="controls-row">
            <div class="lang-bar">
                <button class="control-btn" id="btn-en" onclick="setLang('en')">EN</button>
                <button class="control-btn" id="btn-sv" onclick="setLang('sv')">SV</button>
                <button class="control-btn active" id="btn-es" onclick="setLang('es')">ES</button>
            </div>
        </div>
    </header>

    <div class="input-group">
        <label id="ui-currency">MONEDA</label>
        <select id="currency" onchange="calculate()">
            <option value="USD">USD ($)</option>
            <option value="SEK">SEK (kr)</option>
        </select>
    </div>

    <h2 id="ui-sec-mat">Material e Impresión</h2>
    <div class="row">
        <div class="input-group">
            <label id="ui-weight">PESO DE PIEZA (G)</label>
            <input type="number" id="weight" value="0" oninput="calculate()">
            <div id="heavy-alert" class="alert-heavy">RIESGO MÁX: +400G (80% GANANCIA)</div>
        </div>
        <div class="input-group">
            <label id="ui-cost-kg">COSTO FILAMENTO /KG</label>
            <input type="number" id="costKg" value="0" oninput="calculate()">
        </div>
    </div>
    
    <div class="row">
        <div class="input-group">
            <label id="ui-time">TIEMPO IMPRESIÓN (H)</label>
            <input type="number" id="time" value="0" oninput="calculate()">
        </div>
        <div class="input-group">
            <label id="ui-power">POTENCIA IMPRESORA (W)</label>
            <input type="number" id="power" value="150" oninput="calculate()">
            <span class="warning-text">⚠️ Warning: Consumo kW aproximado según modelo y temperatura.</span>
        </div>
    </div>

    <h2 id="ui-sec-design">Diseño y Labor</h2>
    <div class="row">
        <div class="input-group">
            <label id="ui-design-time">TIEMPO DISEÑO (H)</label>
            <input type="number" id="designTime" value="0" oninput="calculate()">
        </div>
        <div class="input-group">
            <label id="ui-design-rate">PRECIO DISEÑO /H</label>
            <input type="number" id="designRate" value="25" oninput="calculate()">
        </div>
    </div>

    <div class="input-group">
        <label id="ui-markup">GANANCIA BASE (%)</label>
        <input type="number" id="markup" value="40" oninput="calculate()">
    </div>

    <div class="analysis-box">
        <div class="data-line"><span id="ui-inv-mat">COSTO MATERIAL:</span><span id="res-mat" class="val">0.00</span></div>
        <div class="data-line"><span id="ui-inv-elec">CONSUMO ELÉCTRICO:</span><span id="res-elec" class="val">0.00 kW/h</span></div>
        <div class="data-line"><span id="ui-inv-design">MANO OBRA DISEÑO:</span><span id="res-design" class="val">0.00</span></div>
        <div class="data-line" style="border-top:1px solid #333; padding-top:8px; margin-top:5px;"><span id="ui-profit">GANANCIA NETA:</span><span id="res-profit" class="val">0.00</span></div>
    </div>

    <div class="recommended-price">
        <label id="ui-total-lbl">PRECIO DE VENTA RECOMENDADO</label>
        <span class="price-display" id="total-price">0.00 $</span>
    </div>

    <footer>CALCULATOR3D SYSTEM - v5.0</footer>
</div>

<script>
    const i18n = {
        en: {
            weight: "WEIGHT (G)", costKg: "FILAMENT COST /KG", time: "PRINT TIME (H)",
            currency: "CURRENCY", markup: "BASE PROFIT (%)", power: "PRINTER POWER (W)",
            designTime: "DESIGN TIME (H)", designRate: "DESIGN RATE/H",
            secMat: "MATERIAL & PRINT", secDesign: "DESIGN & LABOR",
            invMat: "MATERIAL COST:", invElec: "ELECTRIC CONSUMPTION:",
            invDesign: "DESIGN LABOR:", profit: "NET PROFIT:", total: "RECOMMENDED SALE PRICE",
            heavy: "MAX RISK: +400G (80% PROFIT)",
            warn: "⚠️ Warning: kW consumption is an estimate based on model."
        },
        es: {
            weight: "PESO DE PIEZA (G)", costKg: "COSTO FILAMENTO /KG", time: "TIEMPO IMPRESIÓN (H)",
            currency: "MONEDA", markup: "GANANCIA BASE (%)", power: "POTENCIA IMPRESORA (W)",
            designTime: "TIEMPO DISEÑO (H)", designRate: "PRECIO DISEÑO /H",
            secMat: "MATERIAL E IMPRESIÓN", secDesign: "DISEÑO Y LABOR",
            invMat: "COSTO MATERIAL:", invElec: "CONSUMO ELÉCTRICO:",
            invDesign: "MANO OBRA DISEÑO:", profit: "GANANCIA NETA:", total: "PRECIO DE VENTA RECOMENDADO",
            heavy: "RIESGO MÁX: +400G (80% GANANCIA)",
            warn: "⚠️ Warning: Consumo kW aproximado según modelo."
        }
    };

    function setLang(lang) {
        const t = i18n[lang];
        document.getElementById('ui-weight').innerText = t.weight;
        document.getElementById('ui-cost-kg').innerText = t.costKg;
        document.getElementById('ui-time').innerText = t.time;
        document.getElementById('ui-currency').innerText = t.currency;
        document.getElementById('ui-markup').innerText = t.markup;
        document.getElementById('ui-power').innerText = t.power;
        document.getElementById('ui-design-time').innerText = t.designTime;
        document.getElementById('ui-design-rate').innerText = t.designRate;
        document.getElementById('ui-sec-mat').innerText = t.secMat;
        document.getElementById('ui-sec-design').innerText = t.secDesign;
        document.getElementById('ui-inv-mat').innerText = t.invMat;
        document.getElementById('ui-inv-elec').innerText = t.invElec;
        document.getElementById('ui-inv-design').innerText = t.invDesign;
        document.getElementById('ui-profit').innerText = t.profit;
        document.getElementById('ui-total-lbl').innerText = t.total;
        document.getElementById('heavy-alert').innerText = t.heavy;
        document.querySelector('.warning-text').innerText = t.warn;

        document.querySelectorAll('.lang-bar .control-btn').forEach(b => {
            b.classList.remove('active');
            if(b.id === 'btn-' + lang) b.classList.add('active');
        });
        calculate();
    }

    function calculate() {
        const weight = parseFloat(document.getElementById('weight').value) || 0;
        const costKg = parseFloat(document.getElementById('costKg').value) || 0;
        const time = parseFloat(document.getElementById('time').value) || 0;
        const powerW = parseFloat(document.getElementById('power').value) || 0;
        const designTime = parseFloat(document.getElementById('designTime').value) || 0;
        const designRate = parseFloat(document.getElementById('designRate').value) || 0;
        const baseMarkup = parseFloat(document.getElementById('markup').value) || 0;
        const currency = document.getElementById('currency').value;
        const symbol = currency === 'USD' ? '$' : 'kr';

        // Lógica de Ganancia Automática
        let finalMarkup = (weight >= 400) ? 80 : baseMarkup;
        document.getElementById('heavy-alert').style.display = (weight >= 400) ? 'block' : 'none';

        // Cálculos
        const matCost = (weight * (costKg / 1000));
        
        // CÁLCULO DE kW y COSTO ELÉCTRICO
        const powerKW = powerW / 1000; // Convierte W a kW
        const totalKWh = powerKW * time; // Energía total consumida
        const kwhPrice = (currency === 'USD') ? 0.22 : 2.80; // Precio luz est.
        const elecCost = totalKWh * kwhPrice;

        const designLabor = designTime * designRate;
        const maintenance = time * 0.50; // Desgaste

        const totalInvestment = matCost + elecCost + designLabor + maintenance;
        const netProfit = totalInvestment * (finalMarkup / 100);
        const finalPrice = totalInvestment + netProfit;

        // Renderizado de resultados
        document.getElementById('res-mat').innerText = `${matCost.toFixed(2)} ${symbol}`;
        // Aquí mostramos el valor en kW/h consumido junto al costo en dinero
        document.getElementById('res-elec').innerText = `${totalKWh.toFixed(3)} kWh (${elecCost.toFixed(2)} ${symbol})`;
        document.getElementById('res-design').innerText = `${designLabor.toFixed(2)} ${symbol}`;
        document.getElementById('res-profit').innerText = `${netProfit.toFixed(2)} ${symbol}`;
        document.getElementById('total-price').innerText = `${finalPrice.toFixed(2)} ${symbol}`;
    }

    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js');
    }

    setLang('es');
</script>
</body>
</html>
