<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator3d - Pro Multi-Part</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#39FF14">
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/915/915354.png">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/915/915354.png">

    <style>
        :root {
            --neon-green: #39FF14;
            --neon-glow: 0 0 10px #39FF14;
            --bg-dark: #000000;
            --card-bg: #0a0a0a;
            --base-scale: 100%;
        }

        * { box-sizing: border-box; font-family: 'Courier New', Courier, monospace; }

        body {
            background-color: var(--bg-dark);
            color: var(--neon-green);
            margin: 0;
            padding: 20px;
            font-size: var(--base-scale);
            display: flex;
            justify-content: center;
        }

        .app-container {
            background: var(--card-bg);
            width: 100%;
            max-width: 800px;
            padding: 2em;
            border: 2px solid var(--neon-green);
            box-shadow: var(--neon-glow);
        }

        header {
            text-align: center;
            border-bottom: 2px solid var(--neon-green);
            margin-bottom: 1.5em;
            padding-bottom: 1em;
        }

        .brand-name { font-size: 1.8em; font-weight: bold; letter-spacing: 4px; text-shadow: var(--neon-glow); }

        .controls-row { display: flex; justify-content: space-between; gap: 10px; margin-top: 15px; flex-wrap: wrap; }

        .control-btn {
            background: transparent; border: 1px solid var(--neon-green); color: var(--neon-green);
            padding: 8px 12px; cursor: pointer; font-size: 0.75em; text-transform: uppercase;
        }

        .control-btn.active { background: var(--neon-green); color: #000; font-weight: bold; }

        .part-card {
            border: 1px solid #333;
            padding: 1.5em;
            margin-bottom: 1.5em;
            background: #050505;
        }

        .part-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1em;
            border-bottom: 1px solid #222;
            padding-bottom: 5px;
        }

        .remove-btn {
            background: #ff0055; color: white; border: none; padding: 5px 10px; cursor: pointer; font-size: 0.7em;
        }

        h2 { font-size: 0.9em; margin: 1em 0; text-transform: uppercase; color: var(--neon-green); }

        .input-group { margin-bottom: 1em; }
        label { display: block; font-size: 0.75em; margin-bottom: 0.4em; opacity: 0.8; font-weight: bold; }
        
        input, select {
            width: 100%; background: #000; border: 1px solid var(--neon-green); color: var(--neon-green);
            padding: 0.8em; font-size: 1em; outline: none;
        }

        .row { display: grid; grid-template-columns: 1fr 1fr; gap: 1em; }

        .warning-text { font-size: 0.65em; color: #ffaa00; margin-top: 5px; display: block; }

        .alert-heavy {
            font-size: 0.75em; color: #fff; background: #ff0055;
            padding: 8px; margin: 10px 0; text-align: center; font-weight: bold; display: none;
        }

        .toggle-container {
            display: flex; align-items: center; gap: 10px; margin: 1em 0; font-size: 0.8em;
            border: 1px solid #333; padding: 10px;
        }

        .master-summary {
            margin-top: 2em;
            border: 2px solid var(--neon-green);
            padding: 2em;
            background: rgba(57, 255, 20, 0.05);
        }

        .summary-line {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.8em;
            font-size: 1em;
        }

        .total-highlight {
            background: var(--neon-green);
            color: #000;
            padding: 1.5em;
            text-align: center;
            margin-top: 1em;
        }

        .total-price { font-size: 2.5em; font-weight: 900; display: block; }

        .add-part-btn {
            width: 100%; background: transparent; color: var(--neon-green);
            border: 2px dashed var(--neon-green); padding: 15px;
            cursor: pointer; font-weight: bold; margin-bottom: 2em;
        }

        footer { text-align: center; font-size: 0.7em; margin-top: 2em; opacity: 0.5; }
    </style>
</head>
<body>

<div class="app-container">
    <header>
        <div class="brand-name">CALCULATOR3D</div>
        <div class="controls-row">
            <div class="lang-bar">
                <button class="control-btn" id="btn-en" onclick="setLang('en')">EN</button>
                <button class="control-btn" id="btn-sv" onclick="setLang('sv')">SV</button>
                <button class="control-btn active" id="btn-es" onclick="setLang('es')">ES</button>
            </div>
            <div class="scale-bar">
                <button class="control-btn" onclick="setScale('100%')">100%</button>
                <button class="control-btn" onclick="setScale('125%')">125%</button>
            </div>
        </div>
    </header>

    <div class="input-group">
        <label>MONEDA / CURRENCY</label>
        <select id="currency" onchange="calculateAll()">
            <optgroup label="Global">
                <option value="USD">USD ($)</option>
                <option value="EUR">EUR (€)</option>
            </optgroup>
            <optgroup label="Europe">
                <option value="SEK">SEK (kr)</option>
                <option value="GBP">GBP (£)</option>
            </optgroup>
            <optgroup label="Latinoamérica">
                <option value="MXN">MXN ($)</option>
                <option value="COP">COP ($)</option>
                <option value="ARS">ARS ($)</option>
                <option value="CLP">CLP ($)</option>
            </optgroup>
        </select>
    </div>

    <h2 id="ui-global-settings">CONFIGURACIÓN BASE</h2>
    <div class="row">
        <div class="input-group">
            <label id="ui-cost-kg">COSTO FILAMENTO /KG</label>
            <input type="number" id="globalCostKg" value="25" step="0.01" oninput="calculateAll()">
        </div>
        <div class="input-group">
            <label id="ui-markup">GANANCIA BASE (%)</label>
            <input type="number" id="globalMarkup" value="40" oninput="calculateAll()">
        </div>
    </div>

    <div class="toggle-container">
        <input type="checkbox" id="overrideGain" onchange="calculateAll()">
        <label id="ui-toggle-label">Liberar porcentaje manual (Ignorar regla 500g)</label>
    </div>

    <div id="parts-container"></div>

    <button class="add-part-btn" onclick="addPart()" id="ui-add-part">+ AGREGAR OTRA PIEZA</button>

    <div class="master-summary">
        <h2 id="ui-summary-title" style="text-align: center;">RESUMEN TOTAL</h2>
        <div class="summary-line">
            <span id="ui-total-inv">INVERSIÓN TOTAL:</span>
            <span id="master-inv" class="val">0.00</span>
        </div>
        <div class="summary-line">
            <span id="ui-total-profit">GANANCIA TOTAL:</span>
            <span id="master-profit" class="val">0.00</span>
        </div>
        <div class="summary-line">
            <span id="ui-total-kwh">CONSUMO TOTAL:</span>
            <span id="master-kwh" class="val">0.000 kWh</span>
        </div>

        <div class="total-highlight">
            <label id="ui-final-label">PRECIO FINAL RECOMENDADO</label>
            <span class="total-price" id="master-total">0.00 $</span>
        </div>
    </div>

    <div class="disclaimer-text" id="ui-disclaimer" style="font-size: 0.6em; color: #666; margin-top: 15px; text-align: center;">
        Tarifas eléctricas promediadas regionalmente.
    </div>

    <footer>CALCULATOR3D - v7.9 (Calculus Fix)</footer>
</div>

<script>
    let partCount = 0;
    const powerRates = { USD: 0.22, EUR: 0.28, SEK: 2.80, GBP: 0.24, MXN: 2.10, COP: 750, ARS: 65, CLP: 145 };
    const symbols = { USD: "$", EUR: "€", SEK: "kr", GBP: "£", MXN: "$", COP: "$", ARS: "$", CLP: "$" };

    const i18n = {
        es: {
            add: "+ AGREGAR OTRA PIEZA", summary: "RESUMEN TOTAL DEL PEDIDO",
            inv: "INVERSIÓN TOTAL:", profit: "GANANCIA TOTAL:",
            kwh: "CONSUMO TOTAL:", final: "PRECIO FINAL RECOMENDADO",
            part: "PIEZA", weight: "PESO (G)", time: "TIEMPO (H)", 
            design: "DISEÑO (H)", remove: "ELIMINAR", watts: "WATTS",
            warnWeight: "⚠️ +500g aplica 80% ganancia.",
            toggle: "Liberar porcentaje manual (Ignorar regla 500g)",
            global: "CONFIGURACIÓN BASE", filament: "COSTO FILAMENTO /KG", markup: "GANANCIA BASE (%)"
        },
        en: {
            add: "+ ADD ANOTHER PART", summary: "TOTAL ORDER SUMMARY",
            inv: "TOTAL INVESTMENT:", profit: "TOTAL PROFIT:",
            kwh: "TOTAL CONSUMPTION:", final: "RECOMMENDED FINAL PRICE",
            part: "PART", weight: "WEIGHT (G)", time: "TIME (H)", 
            design: "DESIGN (H)", remove: "REMOVE", watts: "WATTS",
            warnWeight: "⚠️ +500g applies 80% profit.",
            toggle: "Manual override (Ignore 500g rule)",
            global: "BASE SETTINGS", filament: "FILAMENT COST /KG", markup: "BASE PROFIT (%)"
        },
        sv: {
            add: "+ LÄGG TILL EN ANNAN DEL", summary: "TOTAL ORDER SAMMANFATTNING",
            inv: "TOTAL INVESTERING:", profit: "TOTAL VINST:",
            kwh: "TOTAL FÖRBRUKNING:", final: "REKOMMENDERAT SLUTPRIS",
            part: "DEL", weight: "VIKT (G)", time: "TID (H)", 
            design: "DESIGN (H)", remove: "TA BORT", watts: "WATT",
            warnWeight: "⚠️ +500g tillämpar 80% vinst.",
            toggle: "Manuell vinstjustering (Ignorera 500g-regeln)",
            global: "BASINSTÄLLNINGAR", filament: "FILAMENTKOSTNAD /KG", markup: "BASVINST (%)"
        }
    };

    let currentLang = 'es';

    function setScale(p) { document.documentElement.style.setProperty('--base-scale', p); }

    function addPart() {
        partCount++;
        const container = document.getElementById('parts-container');
        const partHtml = `
            <div class="part-card" id="part-${partCount}">
                <div class="part-header">
                    <span style="font-weight:bold">${i18n[currentLang].part} #${partCount}</span>
                    <button class="remove-btn" onclick="removePart(${partCount})">${i18n[currentLang].remove}</button>
                </div>
                <div class="row">
                    <div class="input-group">
                        <label>${i18n[currentLang].weight}</label>
                        <input type="number" class="p-weight" value="0" step="0.1" oninput="calculateAll()">
                    </div>
                    <div class="input-group">
                        <label>${i18n[currentLang].time}</label>
                        <input type="number" class="p-time" value="0" step="0.1" oninput="calculateAll()">
                    </div>
                </div>
                <div class="row">
                    <div class="input-group">
                        <label>${i18n[currentLang].design}</label>
                        <input type="number" class="p-design" value="0" step="0.1" oninput="calculateAll()">
                    </div>
                    <div class="input-group">
                        <label>${i18n[currentLang].watts}</label>
                        <input type="number" class="p-watts" value="150" oninput="calculateAll()">
                    </div>
                </div>
                <div class="alert-heavy" id="heavy-${partCount}" style="display:none; color:#ff0055; font-size:0.7em;">⚠️ RIESGO +500G: GANANCIA 80%</div>
            </div>
        `;
        container.insertAdjacentHTML('beforeend', partHtml);
        calculateAll();
    }

    function removePart(id) {
        document.getElementById(`part-${id}`).remove();
        calculateAll();
    }

    function setLang(lang) {
        currentLang = lang;
        const t = i18n[lang];
        document.getElementById('ui-add-part').innerText = t.add;
        document.getElementById('ui-summary-title').innerText = t.summary;
        document.getElementById('ui-total-inv').innerText = t.inv;
        document.getElementById('ui-total-profit').innerText = t.profit;
        document.getElementById('ui-total-kwh').innerText = t.kwh;
        document.getElementById('ui-final-label').innerText = t.final;
        document.getElementById('ui-global-settings').innerText = t.global;
        document.getElementById('ui-cost-kg').innerText = t.filament;
        document.getElementById('ui-markup').innerText = t.markup;
        document.getElementById('ui-toggle-label').innerText = t.toggle;

        document.querySelectorAll('.lang-bar .control-btn').forEach(b => {
            b.classList.remove('active');
            if(b.id === 'btn-' + lang) b.classList.add('active');
        });
        calculateAll();
    }

    function calculateAll() {
        const curr = document.getElementById('currency').value;
        const globalCostKg = parseFloat(document.getElementById('globalCostKg').value) || 0;
        const globalMarkup = parseFloat(document.getElementById('globalMarkup').value) || 0;
        const manualOverride = document.getElementById('overrideGain').checked;
        const sym = symbols[curr];
        const rate = powerRates[curr];

        let totalInv = 0;
        let totalProfit = 0;
        let totalKWh = 0;

        document.querySelectorAll('.part-card').forEach(card => {
            const w = parseFloat(card.querySelector('.p-weight').value) || 0;
            const t = parseFloat(card.querySelector('.p-time').value) || 0;
            const d = parseFloat(card.querySelector('.p-design').value) || 0;
            const p = parseFloat(card.querySelector('.p-watts').value) || 0;

            // 1. COSTO FILAMENTO: (Gramos / 1000) * Precio_Kilo
            const matCost = (w / 1000) * globalCostKg;
            
            // 2. COSTO ELÉCTRICO: (Watts * Horas / 1000) * Tarifa
            const kwh = (p * t) / 1000;
            const elecCost = kwh * rate;
            
            // 3. MANTENIMIENTO: Valor fijo por hora (aprox 0.20 USD o equivalente)
            const hourlyMaint = curr === 'USD' ? 0.25 : (rate * 0.5);
            const maintCost = t * hourlyMaint;

            // 4. LABOR DISEÑO: (Horas Diseño * Tarifa Hora)
            // Tarifa diseño fija estimada (puedes ajustar esta lógica si quieres una casilla global)
            const designLabor = d * (curr === 'USD' ? 25 : (rate * 100));

            const partCostBase = matCost + elecCost + maintCost + designLabor;
            
            // 5. PORCENTAJE DE GANANCIA
            let partMarkup = globalMarkup;
            const alert = card.querySelector('.alert-heavy');
            if (w >= 500 && !manualOverride) {
                partMarkup = 80;
                alert.style.display = 'block';
            } else {
                alert.style.display = 'none';
            }

            const partProfit = partCostBase * (partMarkup / 100);

            totalInv += partCostBase;
            totalProfit += partProfit;
            totalKWh += kwh;
        });

        const finalPrice = totalInv + totalProfit;

        document.getElementById('master-inv').innerText = `${totalInv.toFixed(2)} ${sym}`;
        document.getElementById('master-profit').innerText = `${totalProfit.toFixed(2)} ${sym}`;
        document.getElementById('master-kwh').innerText = `${totalKWh.toFixed(3)} kWh`;
        document.getElementById('master-total').innerText = `${finalPrice.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})} ${sym}`;
    }

    addPart();
    setLang('es');
</script>
</body>
</html>
