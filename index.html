<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator3d - Multi-Part Pro</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#39FF14">
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/915/915354.png">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/915/915354.png">

    <style>
        :root {
            --neon-green: #39FF14;
            --neon-glow: 0 0 10px #39FF14;
            --bg-dark: #000000;
            --card-bg: #0a0a0a;
            --base-scale: 100%;
        }

        * { box-sizing: border-box; font-family: 'Courier New', Courier, monospace; }

        body {
            background-color: var(--bg-dark);
            color: var(--neon-green);
            margin: 0;
            padding: 20px;
            font-size: var(--base-scale);
            display: flex;
            justify-content: center;
        }

        .app-container {
            background: var(--card-bg);
            width: 100%;
            max-width: 800px;
            padding: 2em;
            border: 2px solid var(--neon-green);
            box-shadow: var(--neon-glow);
        }

        header {
            text-align: center;
            border-bottom: 2px solid var(--neon-green);
            margin-bottom: 1.5em;
            padding-bottom: 1em;
        }

        .brand-name { font-size: 1.8em; font-weight: bold; letter-spacing: 4px; text-shadow: var(--neon-glow); }

        .controls-row { display: flex; justify-content: space-between; gap: 10px; margin-top: 15px; }

        .control-btn {
            background: transparent; border: 1px solid var(--neon-green); color: var(--neon-green);
            padding: 8px 12px; cursor: pointer; font-size: 0.8em; text-transform: uppercase;
        }

        .control-btn.active { background: var(--neon-green); color: #000; font-weight: bold; }

        /* Piezas */
        .part-card {
            border: 1px solid #333;
            padding: 1.5em;
            margin-bottom: 1.5em;
            position: relative;
            background: #050505;
        }

        .part-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1em;
            border-bottom: 1px solid #222;
            padding-bottom: 5px;
        }

        .remove-btn {
            background: #ff0055; color: white; border: none; padding: 5px 10px; cursor: pointer; font-size: 0.7em;
        }

        h2 { font-size: 0.9em; margin: 1em 0; text-transform: uppercase; color: #fff; }

        .input-group { margin-bottom: 1em; }
        label { display: block; font-size: 0.75em; margin-bottom: 0.4em; opacity: 0.8; }
        
        input, select {
            width: 100%; background: #000; border: 1px solid var(--neon-green); color: var(--neon-green);
            padding: 0.8em; font-size: 1em; outline: none;
        }

        .row { display: grid; grid-template-columns: 1fr 1fr; gap: 1em; }

        .warning-text { font-size: 0.65em; color: #ffaa00; margin-top: 5px; display: block; }

        /* Totales Finales */
        .master-summary {
            margin-top: 2em;
            border: 2px solid var(--neon-green);
            padding: 2em;
            background: rgba(57, 255, 20, 0.05);
        }

        .summary-line {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.8em;
            font-size: 1em;
        }

        .total-highlight {
            background: var(--neon-green);
            color: #000;
            padding: 1.5em;
            text-align: center;
            margin-top: 1em;
        }

        .total-price { font-size: 2.5em; font-weight: 900; display: block; }

        .add-part-btn {
            width: 100%;
            background: transparent;
            color: var(--neon-green);
            border: 2px dashed var(--neon-green);
            padding: 15px;
            cursor: pointer;
            font-weight: bold;
            margin-bottom: 2em;
        }

        .add-part-btn:hover { background: rgba(57, 255, 20, 0.1); }

        footer { text-align: center; font-size: 0.7em; margin-top: 2em; opacity: 0.5; }
    </style>
</head>
<body>

<div class="app-container">
    <header>
        <div class="brand-name">CALCULATOR3D</div>
        <div class="controls-row">
            <div class="lang-bar">
                <button class="control-btn" id="btn-en" onclick="setLang('en')">EN</button>
                <button class="control-btn" id="btn-sv" onclick="setLang('sv')">SV</button>
                <button class="control-btn active" id="btn-es" onclick="setLang('es')">ES</button>
            </div>
            <select id="currency" style="width: auto;" onchange="calculateAll()">
                <option value="USD">USD ($)</option>
                <option value="SEK">SEK (kr)</option>
                <option value="EUR">EUR (€)</option>
                <option value="MXN">MXN ($)</option>
                <option value="COP">COP ($)</option>
            </select>
        </div>
    </header>

    <div class="row" style="margin-bottom: 20px; border-bottom: 1px solid #333; padding-bottom: 20px;">
        <div class="input-group">
            <label id="ui-global-filament">COSTO FILAMENTO /KG (BASE)</label>
            <input type="number" id="globalCostKg" value="25" oninput="calculateAll()">
        </div>
        <div class="input-group">
            <label id="ui-global-markup">GANANCIA BASE %</label>
            <input type="number" id="globalMarkup" value="40" oninput="calculateAll()">
        </div>
    </div>

    <div id="parts-container">
        </div>

    <button class="add-part-btn" onclick="addPart()" id="ui-add-part">+ AGREGAR OTRA PIEZA</button>

    <div class="master-summary">
        <h2 id="ui-summary-title" style="text-align: center; border: none; font-size: 1.2em;">RESUMEN TOTAL DEL PEDIDO</h2>
        <div class="summary-line">
            <span id="ui-total-inv">INVERSIÓN TOTAL (Costos):</span>
            <span id="master-inv" class="val">0.00</span>
        </div>
        <div class="summary-line">
            <span id="ui-total-profit">GANANCIA TOTAL:</span>
            <span id="master-profit" class="val">0.00</span>
        </div>
        <div class="summary-line">
            <span id="ui-total-kwh">CONSUMO TOTAL (kWh):</span>
            <span id="master-kwh" class="val">0.000</span>
        </div>

        <div class="total-highlight">
            <label id="ui-final-label">PRECIO FINAL RECOMENDADO</label>
            <span class="total-price" id="master-total">0.00 $</span>
        </div>
    </div>

    <footer>CALCULATOR3D MULTI-PART - v7.0</footer>
</div>

<script>
    let partCount = 0;
    const powerRates = { USD: 0.22, SEK: 2.80, EUR: 0.28, MXN: 2.10, COP: 750 };
    const symbols = { USD: "$", SEK: "kr", EUR: "€", MXN: "$", COP: "$" };

    const i18n = {
        es: {
            add: "+ AGREGAR OTRA PIEZA", summary: "RESUMEN TOTAL DEL PEDIDO",
            inv: "INVERSIÓN TOTAL (Costos):", profit: "GANANCIA TOTAL:",
            kwh: "CONSUMO TOTAL (kWh):", final: "PRECIO FINAL RECOMENDADO",
            part: "PIEZA", weight: "PESO (G)", time: "TIEMPO (H)", 
            design: "DISEÑO (H)", remove: "ELIMINAR",
            warn: "⚠️ +500g aplica 80% ganancia."
        },
        en: {
            add: "+ ADD ANOTHER PART", summary: "TOTAL ORDER SUMMARY",
            inv: "TOTAL INVESTMENT (Costs):", profit: "TOTAL PROFIT:",
            kwh: "TOTAL CONSUMPTION (kWh):", final: "RECOMMENDED FINAL PRICE",
            part: "PART", weight: "WEIGHT (G)", time: "TIME (H)", 
            design: "DESIGN (H)", remove: "REMOVE",
            warn: "⚠️ +500g applies 80% profit."
        },
        sv: {
            add: "+ LÄGG TILL EN ANNAN DEL", summary: "TOTAL ORDER SAMMANFATTNING",
            inv: "TOTAL INVESTERING (Kostnader):", profit: "TOTAL VINST:",
            kwh: "TOTAL FÖRBRUKNING (kWh):", final: "REKOMMENDERAT SLUTPRIS",
            part: "DEL", weight: "VIKT (G)", time: "TID (H)", 
            design: "DESIGN (H)", remove: "TA BORT",
            warn: "⚠️ +500g tillämpar 80% vinst."
        }
    };

    let currentLang = 'es';

    function addPart() {
        partCount++;
        const container = document.getElementById('parts-container');
        const partHtml = `
            <div class="part-card" id="part-${partCount}">
                <div class="part-header">
                    <span style="font-weight:bold">${i18n[currentLang].part} #${partCount}</span>
                    <button class="remove-btn" onclick="removePart(${partCount})">${i18n[currentLang].remove}</button>
                </div>
                <div class="row">
                    <div class="input-group">
                        <label>${i18n[currentLang].weight}</label>
                        <input type="number" class="p-weight" value="0" oninput="calculateAll()">
                        <span class="warning-text">${i18n[currentLang].warn}</span>
                    </div>
                    <div class="input-group">
                        <label>${i18n[currentLang].time}</label>
                        <input type="number" class="p-time" value="0" oninput="calculateAll()">
                    </div>
                </div>
                <div class="row">
                    <div class="input-group">
                        <label>${i18n[currentLang].design}</label>
                        <input type="number" class="p-design" value="0" oninput="calculateAll()">
                    </div>
                    <div class="input-group">
                        <label>WATTS</label>
                        <input type="number" class="p-watts" value="150" oninput="calculateAll()">
                    </div>
                </div>
            </div>
        `;
        container.insertAdjacentHTML('beforeend', partHtml);
        calculateAll();
    }

    function removePart(id) {
        document.getElementById(`part-${id}`).remove();
        calculateAll();
    }

    function setLang(lang) {
        currentLang = lang;
        document.getElementById('ui-add-part').innerText = i18n[lang].add;
        document.getElementById('ui-summary-title').innerText = i18n[lang].summary;
        document.getElementById('ui-total-inv').innerText = i18n[lang].inv;
        document.getElementById('ui-total-profit').innerText = i18n[lang].profit;
        document.getElementById('ui-total-kwh').innerText = i18n[lang].kwh;
        document.getElementById('ui-final-label').innerText = i18n[lang].final;
        
        document.querySelectorAll('.lang-bar .control-btn').forEach(b => {
            b.classList.remove('active');
            if(b.id === 'btn-' + lang) b.classList.add('active');
        });
        
        // Actualizar textos en tarjetas existentes
        document.querySelectorAll('.part-card').forEach(card => {
            card.querySelector('.warning-text').innerText = i18n[lang].warn;
            card.querySelector('.remove-btn').innerText = i18n[lang].remove;
        });

        calculateAll();
    }

    function calculateAll() {
        const curr = document.getElementById('currency').value;
        const globalCostKg = parseFloat(document.getElementById('globalCostKg').value) || 0;
        const globalMarkup = parseFloat(document.getElementById('globalMarkup').value) || 0;
        const sym = symbols[curr];
        const rate = powerRates[curr];

        let totalInv = 0;
        let totalProfit = 0;
        let totalKWh = 0;

        document.querySelectorAll('.part-card').forEach(card => {
            const w = parseFloat(card.querySelector('.p-weight').value) || 0;
            const t = parseFloat(card.querySelector('.p-time').value) || 0;
            const d = parseFloat(card.querySelector('.p-design').value) || 0;
            const p = parseFloat(card.querySelector('.p-watts').value) || 0;

            // Inversión por pieza
            const matCost = (w * (globalCostKg / 1000));
            const kwh = (p * t) / 1000;
            const elecCost = kwh * rate;
            const wear = t * 0.50; // Mantenimiento fijo
            const labor = d * (curr === 'USD' ? 25 : 250); // Tarifa diseño promedio

            const partInv = matCost + elecCost + wear + labor;
            
            // Ganancia (80% si > 500g)
            const markup = (w >= 500) ? 80 : globalMarkup;
            const partProfit = partInv * (markup / 100);

            totalInv += partInv;
            totalProfit += partProfit;
            totalKWh += kwh;
        });

        const finalPrice = totalInv + totalProfit;

        document.getElementById('master-inv').innerText = `${totalInv.toLocaleString()} ${sym}`;
        document.getElementById('master-profit').innerText = `${totalProfit.toLocaleString()} ${sym}`;
        document.getElementById('master-kwh').innerText = totalKWh.toFixed(3);
        document.getElementById('master-total').innerText = `${finalPrice.toLocaleString()} ${sym}`;
    }

    // Inicializar con una pieza
    setScale('100%');
    addPart();
    setLang('es');
</script>
</body>
</html>
